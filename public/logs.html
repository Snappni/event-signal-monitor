<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>运行日志 | 事件信号监控引擎</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><div class="brand-mark" aria-hidden="true">ES</div><div><span class="eyebrow">SIGNAL OPERATIONS</span><h1>事件信号监控引擎</h1><p id="subtitle">读取运行状态</p></div></div>
      <nav class="toolbar" aria-label="主导航">
        <span class="nav-caption">分析工作台</span>
        <a class="toolbar-link" href="/"><span aria-hidden="true">⌂</span>实时监控</a>
        <a class="toolbar-link" href="/summary.html"><span aria-hidden="true">⌁</span>账户总结</a>
        <a class="toolbar-link" href="/signals.html"><span aria-hidden="true">⌁</span>信号复盘</a>
        <a class="toolbar-link" href="/messages.html"><span aria-hidden="true">◫</span>消息情报</a>
        <a class="toolbar-link" href="/models.html"><span aria-hidden="true">∿</span>模型计算</a>
        <a class="toolbar-link active" href="/logs.html" aria-current="page"><span aria-hidden="true">≡</span>运行日志</a>
        <a class="toolbar-link" href="/review.html"><span aria-hidden="true">↻</span>迭代复盘</a>
        <div class="nav-footer"><span class="environment-state"><i></i>模拟环境</span><button id="refreshButton" type="button">刷新日志</button></div>
      </nav>
    </header>
    <main class="detail-page">
      <section class="page-heading">
        <div><span class="eyebrow">RUNTIME OBSERVABILITY</span><h2>运行日志</h2><p>追踪每轮监控的启动、完成、耗时与失败信息</p></div>
        <span class="live-state"><i></i>日志流读取中</span>
      </section>
      <section class="summary-grid detail-summary" aria-label="运行摘要">
        <div class="metric detail-metric-wide"><span>监控循环</span><strong id="loopValue">-</strong></div>
        <div class="metric detail-metric-wide"><span>最新报告时间</span><strong id="pageDataTime" class="metric-time">-</strong></div>
      </section>
      <section class="panel detail-panel log-panel">
        <div class="section-title"><h2>fast-loop.log</h2><div class="log-tools"><span id="logNotice">检查历史编码</span><button id="toggleRawLog" type="button">显示原始日志</button></div></div>
        <pre id="logView" class="detail-log"></pre>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
