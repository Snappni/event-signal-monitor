<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>事件信号监控引擎</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">ES</div>
        <div>
          <span class="eyebrow">SIGNAL OPERATIONS</span>
          <h1>事件信号监控引擎</h1>
          <p id="subtitle">paper-alert-only</p>
        </div>
      </div>
      <nav class="toolbar" aria-label="主导航">
        <span class="nav-caption">分析工作台</span>
        <a class="toolbar-link active" href="/" aria-current="page"><span aria-hidden="true">⌂</span>实时监控</a>
        <a class="toolbar-link" href="/summary.html"><span aria-hidden="true">⌁</span>账户总结</a>
        <a class="toolbar-link" href="/signals.html"><span aria-hidden="true">⌁</span>信号复盘</a>
        <a class="toolbar-link" href="/messages.html"><span aria-hidden="true">◫</span>消息情报</a>
        <a class="toolbar-link" href="/models.html"><span aria-hidden="true">∿</span>模型计算</a>
        <a class="toolbar-link" href="/logs.html"><span aria-hidden="true">≡</span>运行日志</a>
        <a class="toolbar-link" href="/review.html"><span aria-hidden="true">↻</span>迭代复盘</a>
        <div class="nav-footer">
          <span class="environment-state"><i></i>模拟环境</span>
          <button id="refreshButton" type="button">刷新数据</button>
        </div>
      </nav>
    </header>

    <main>
      <section class="page-heading">
        <div><span class="eyebrow">LIVE MARKET DESK</span><h2>实时市场工作台</h2><p>聚合事件、量化信号与模拟账户风险状态</p></div>
        <span class="live-state"><i></i>高频监控中</span>
      </section>
      <section class="summary-grid" aria-label="状态摘要">
        <div class="metric">
          <span>分析模式</span>
          <strong id="layerValue">-</strong>
        </div>
        <div class="metric">
          <span>开仓候选</span>
          <strong id="actionableValue">0</strong>
        </div>
        <div class="metric">
          <span>观察列表</span>
          <strong id="watchValue">0</strong>
        </div>
        <div class="metric">
          <span>消息面</span>
          <strong id="messageValue">0</strong>
        </div>
        <div class="metric">
          <span>市场计算</span>
          <strong id="modelValue">0</strong>
        </div>
        <div class="metric">
          <span>监控循环</span>
          <strong id="loopValue">-</strong>
        </div>
      </section>

      <section class="panel account-panel">
        <div class="section-title">
          <h2>模拟账户</h2>
          <span id="accountUpdatedAt">-</span>
        </div>
        <div class="account-layout">
          <form id="accountForm" class="account-form">
            <label>
              <span>本金</span>
              <input id="accountCapital" name="initialCapital" type="number" min="100" step="100" />
            </label>
            <label>
              <span>市场类型</span>
              <select id="accountMarketType" name="marketType">
                <option value="futures">合约</option>
                <option value="spot">现货</option>
              </select>
            </label>
            <label>
              <span>杠杆硬上限</span>
              <input id="accountMaxLeverage" name="maxLeverage" type="number" min="1" max="125" step="1" />
            </label>
            <label>
              <span>策略风格</span>
              <select id="accountRiskProfile" name="riskProfile">
                <option value="conservative">保守型</option>
                <option value="aggressive">激进型</option>
              </select>
            </label>
            <p class="account-form-help">“启动模拟”会先应用当前本金、市场类型、杠杆上限和策略风格，再启动新的模拟会话。</p>
            <div class="account-actions">
              <button id="startAccountButton" class="primary-action" type="button">启动模拟</button>
              <button id="saveAccountButton" type="submit">仅保存并重置</button>
              <button id="resetAccountButton" type="button">重置账户</button>
              <button id="summaryButton" type="button">打开总结页</button>
            </div>
          </form>
          <div class="account-metrics" id="accountMetrics"></div>
        </div>
        <div class="position-toolbar">
          <strong>模拟持仓记录</strong>
          <div class="segmented position-tabs" role="tablist" aria-label="持仓状态">
            <button class="active" data-position-view="open" type="button">
              未平仓 <span id="openPositionCount">0</span>
            </button>
            <button data-position-view="closed" type="button">
              已平仓 <span id="closedPositionCount">0</span>
            </button>
          </div>
        </div>
        <div id="accountPositions" class="position-list"></div>
        <div class="account-page-links">
          <a href="/summary.html">查看账户阶段总结与图表</a>
          <a href="/signals.html">查看开仓信号与复盘</a>
          <a href="/review.html">查看交易链路与模型迭代</a>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
