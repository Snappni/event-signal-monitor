<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>信号复盘 | 事件信号监控引擎</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><div class="brand-mark" aria-hidden="true">ES</div><div><span class="eyebrow">SIGNAL OPERATIONS</span><h1>事件信号监控引擎</h1><p id="subtitle">读取实时信号</p></div></div>
      <nav class="toolbar" aria-label="主导航">
        <span class="nav-caption">分析工作台</span>
        <a class="toolbar-link" href="/"><span aria-hidden="true">⌂</span>实时监控</a>
        <a class="toolbar-link" href="/summary.html"><span aria-hidden="true">⌁</span>账户总结</a>
        <a class="toolbar-link active" href="/signals.html" aria-current="page"><span aria-hidden="true">⌁</span>信号复盘</a>
        <a class="toolbar-link" href="/messages.html"><span aria-hidden="true">◫</span>消息情报</a>
        <a class="toolbar-link" href="/models.html"><span aria-hidden="true">∿</span>模型计算</a>
        <a class="toolbar-link" href="/logs.html"><span aria-hidden="true">≡</span>运行日志</a>
        <a class="toolbar-link" href="/review.html"><span aria-hidden="true">↻</span>迭代复盘</a>
        <div class="nav-footer"><span class="environment-state"><i></i>模拟环境</span><button id="refreshButton" type="button">刷新信号</button></div>
      </nav>
    </header>
    <main class="detail-page">
      <section class="page-heading">
        <div><span class="eyebrow">SIGNAL DECISION DESK</span><h2>开仓与复盘</h2><p>集中查看候选、跟踪、平仓结果与观察信号</p></div>
        <span class="live-state"><i></i>持续评估中</span>
      </section>
      <section class="summary-grid detail-summary" aria-label="信号摘要">
        <div class="metric"><span>开仓候选</span><strong id="actionableValue">0</strong></div>
        <div class="metric"><span>观察列表</span><strong id="watchValue">0</strong></div>
        <div class="metric"><span>监控循环</span><strong id="loopValue">-</strong></div>
        <div class="metric"><span>数据时间</span><strong id="pageDataTime" class="metric-time">-</strong></div>
      </section>
      <section class="panel detail-panel">
        <div class="section-title"><h2>信号决策列表</h2><span id="reportTime">-</span></div>
        <div id="signals" class="detail-scroll"></div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
