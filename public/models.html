<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>模型计算 | 事件信号监控引擎</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><div class="brand-mark" aria-hidden="true">ES</div><div><span class="eyebrow">SIGNAL OPERATIONS</span><h1>事件信号监控引擎</h1><p id="subtitle">读取模型快照</p></div></div>
      <nav class="toolbar" aria-label="主导航">
        <span class="nav-caption">分析工作台</span>
        <a class="toolbar-link" href="/"><span aria-hidden="true">⌂</span>实时监控</a>
        <a class="toolbar-link" href="/summary.html"><span aria-hidden="true">⌁</span>账户总结</a>
        <a class="toolbar-link" href="/signals.html"><span aria-hidden="true">⌁</span>信号复盘</a>
        <a class="toolbar-link" href="/messages.html"><span aria-hidden="true">◫</span>消息情报</a>
        <a class="toolbar-link active" href="/models.html" aria-current="page"><span aria-hidden="true">∿</span>模型计算</a>
        <a class="toolbar-link" href="/logs.html"><span aria-hidden="true">≡</span>运行日志</a>
        <a class="toolbar-link" href="/review.html"><span aria-hidden="true">↻</span>迭代复盘</a>
        <div class="nav-footer"><span class="environment-state"><i></i>模拟环境</span><button id="refreshButton" type="button">刷新计算</button></div>
      </nav>
    </header>
    <main class="detail-page">
      <section class="page-heading">
        <div><span class="eyebrow">MODEL LAB</span><h2>数学模型计算过程</h2><p>查看行情输入、模型状态、胜率、EV、风险收益和自适应门槛</p></div>
        <span class="live-state"><i></i>模型运算中</span>
      </section>
      <section class="summary-grid detail-summary" aria-label="模型摘要">
        <div class="metric"><span>市场计算</span><strong id="modelValue">0</strong></div>
        <div class="metric"><span>开仓候选</span><strong id="actionableValue">0</strong></div>
        <div class="metric"><span>观察列表</span><strong id="watchValue">0</strong></div>
        <div class="metric"><span>数据时间</span><strong id="pageDataTime" class="metric-time">-</strong></div>
      </section>
      <section class="panel detail-panel">
        <div class="section-title"><h2>模型明细</h2><span>展开可查看完整计算公式</span></div>
        <div id="models" class="model-list detail-scroll"></div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
